    <!-- Fire Purchase event with real amount from query params -->
    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var amount = parseFloat(params.get('amount'));
        var currency = params.get('currency') || 'USD';
        if (amount && !isNaN(amount) && typeof fbq === 'function') {
            fbq('track', 'Purchase', {
                value: amount,
                currency: currency
            });
        }
    })();
    </script>
