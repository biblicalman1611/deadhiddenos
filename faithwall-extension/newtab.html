<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FaithWall</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a227;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, 'Times New Roman', serif;
      color: #f0ebe0;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Subtle grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(201,162,39,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(201,162,39,0.02) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 680px;
      width: 90%;
      text-align: center;
      padding: 0 20px;
      animation: fadeIn 1.2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Cross mark */
    .cross-mark {
      font-size: 28px;
      color: var(--gold);
      opacity: 0.7;
      margin-bottom: 36px;
      letter-spacing: 4px;
    }

    /* Verse */
    .verse-text {
      font-size: clamp(16px, 2.2vw, 22px);
      line-height: 1.75;
      color: #e8dfc8;
      font-style: italic;
      font-weight: 400;
      margin-bottom: 24px;
      quotes: "\u201C" "\u201D";
    }

    .verse-text::before {
      content: open-quote;
      color: var(--gold);
      opacity: 0.5;
      font-size: 1.4em;
      line-height: 0;
      vertical-align: -0.4em;
      margin-right: 4px;
    }

    .verse-text::after {
      content: close-quote;
      color: var(--gold);
      opacity: 0.5;
      font-size: 1.4em;
      line-height: 0;
      vertical-align: -0.4em;
      margin-left: 4px;
    }

    /* Reference */
    .verse-ref {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.8;
      margin-bottom: 40px;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: rgba(201,162,39,0.25);
      margin: 0 auto 36px;
    }

    /* Date */
    .date-display {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #3a3020;
    }

    /* Footer branding */
    .brand-footer {
      position: fixed;
      bottom: 24px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #2a2010;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="cross-mark">✝</div>
  <div class="verse-text" id="verseText">Loading…</div>
  <div class="verse-ref" id="verseRef"></div>
  <div class="divider"></div>
  <div class="date-display" id="dateDisplay"></div>
</div>

<div class="brand-footer">FaithWall · KJV</div>

<script>
(async function () {
  // Check if new tab override is enabled
  const data = await chrome.storage.local.get(['newTabEnabled']);
  if (data.newTabEnabled === false) {
    // Redirect to default new tab — can't do chrome://newtab, so show minimal page
    document.body.style.background = '#fff';
    document.querySelector('.container').style.display = 'none';
    document.querySelector('.brand-footer').style.display = 'none';
    return;
  }

  // Load verses
  const verses = await fetch(chrome.runtime.getURL('verses.json')).then(r => r.json());

  // Pick verse by day-of-year for deterministic daily rotation
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  const oneDay = 1000 * 60 * 60 * 24;
  const dayOfYear = Math.floor(diff / oneDay);
  const verse = verses[dayOfYear % verses.length];

  document.getElementById('verseText').textContent = verse.text;
  document.getElementById('verseRef').textContent = verse.ref;

  // Date display
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('dateDisplay').textContent =
    `${dayNames[now.getDay()]} · ${monthNames[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
})();
</script>

</body>
</html>
