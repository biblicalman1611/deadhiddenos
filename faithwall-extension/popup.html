<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FaithWall</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #f0ebe0;
    }

    .header {
      background: linear-gradient(135deg, #1a1207 0%, #0f0c04 100%);
      border-bottom: 1px solid #2a2010;
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #c9a227 0%, #8a6b10 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .brand h1 {
      font-size: 17px;
      font-weight: 700;
      color: #e8d48a;
      letter-spacing: 0.5px;
    }

    .brand p {
      font-size: 11px;
      color: #7a6840;
      margin-top: 1px;
    }

    .main-toggle-section {
      padding: 18px 20px 16px;
      border-bottom: 1px solid #1a1a1a;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label {
      font-size: 14px;
      font-weight: 600;
      color: #f0ebe0;
    }

    .toggle-sub {
      font-size: 11px;
      color: #5a5040;
      margin-top: 3px;
    }

    /* Toggle switch */
    .toggle-switch {
      position: relative;
      width: 48px;
      height: 26px;
      cursor: pointer;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #2a2a2a;
      border-radius: 26px;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 3px;
      background: #666;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle-switch input:checked + .slider {
      background: #3d2e00;
    }

    .toggle-switch input:checked + .slider::before {
      transform: translateX(22px);
      background: #c9a227;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      margin-top: 10px;
    }

    .status-badge.active {
      background: rgba(201, 162, 39, 0.15);
      color: #c9a227;
      border: 1px solid rgba(201, 162, 39, 0.3);
    }

    .status-badge.inactive {
      background: rgba(80, 80, 80, 0.15);
      color: #666;
      border: 1px solid rgba(80, 80, 80, 0.3);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .active .dot { background: #c9a227; }
    .inactive .dot { background: #555; }

    /* Categories */
    .categories-section {
      padding: 14px 20px;
      border-bottom: 1px solid #1a1a1a;
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #4a4030;
      margin-bottom: 10px;
    }

    .category-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .category-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: #141414;
      border-radius: 8px;
      border: 1px solid #1e1e1e;
    }

    .category-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .category-icon {
      font-size: 14px;
      width: 20px;
      text-align: center;
    }

    .category-name {
      font-size: 12px;
      color: #c0b090;
    }

    .cat-toggle {
      width: 32px;
      height: 18px;
      cursor: pointer;
      position: relative;
    }

    .cat-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .cat-slider {
      position: absolute;
      inset: 0;
      background: #2a2a2a;
      border-radius: 18px;
      transition: background 0.2s;
    }

    .cat-slider::before {
      content: '';
      position: absolute;
      width: 13px;
      height: 13px;
      left: 2.5px;
      top: 2.5px;
      background: #555;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .cat-toggle input:checked + .cat-slider {
      background: #3d2e00;
    }

    .cat-toggle input:checked + .cat-slider::before {
      transform: translateX(14px);
      background: #c9a227;
    }

    /* Footer */
    .footer {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer a {
      font-size: 11px;
      color: #5a4820;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }

    .footer a:hover {
      color: #c9a227;
    }

    .blocked-count {
      font-size: 11px;
      color: #3a3020;
    }

    .blocked-count span {
      color: #c9a227;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">✝</div>
  <div class="brand">
    <h1>FaithWall</h1>
    <p>Guard your eyes. Renew your mind.</p>
  </div>
</div>

<div class="main-toggle-section">
  <div class="toggle-row">
    <div>
      <div class="toggle-label">Protection</div>
      <div class="toggle-sub">Block enabled categories</div>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" id="mainToggle">
      <span class="slider"></span>
    </label>
  </div>
  <div id="statusBadge" class="status-badge inactive">
    <div class="dot"></div>
    <span id="statusText">Inactive</span>
  </div>
</div>

<div class="categories-section">
  <div class="section-title">Categories</div>
  <div class="category-list">
    <div class="category-item">
      <div class="category-info">
        <span class="category-icon">🔞</span>
        <span class="category-name">Adult Content</span>
      </div>
      <label class="cat-toggle">
        <input type="checkbox" data-ruleset="ruleset_porn" id="cat_porn">
        <span class="cat-slider"></span>
      </label>
    </div>
    <div class="category-item">
      <div class="category-info">
        <span class="category-icon">🎲</span>
        <span class="category-name">Gambling</span>
      </div>
      <label class="cat-toggle">
        <input type="checkbox" data-ruleset="ruleset_gambling" id="cat_gambling">
        <span class="cat-slider"></span>
      </label>
    </div>
    <div class="category-item">
      <div class="category-info">
        <span class="category-icon">📱</span>
        <span class="category-name">Social Media</span>
      </div>
      <label class="cat-toggle">
        <input type="checkbox" data-ruleset="ruleset_social" id="cat_social">
        <span class="cat-slider"></span>
      </label>
    </div>
    <div class="category-item">
      <div class="category-info">
        <span class="category-icon">📰</span>
        <span class="category-name">News Doomscroll</span>
      </div>
      <label class="cat-toggle">
        <input type="checkbox" data-ruleset="ruleset_news" id="cat_news">
        <span class="cat-slider"></span>
      </label>
    </div>
    <div class="category-item">
      <div class="category-info">
        <span class="category-icon">🔮</span>
        <span class="category-name">Occult / Horoscope</span>
      </div>
      <label class="cat-toggle">
        <input type="checkbox" data-ruleset="ruleset_occult" id="cat_occult">
        <span class="cat-slider"></span>
      </label>
    </div>
  </div>
</div>

<div class="footer">
  <div class="blocked-count">Today: <span id="blockedCount">0</span> blocked</div>
  <a href="#" id="optionsLink">Full Options ›</a>
</div>

<script src="popup.js"></script>
</body>
</html>
